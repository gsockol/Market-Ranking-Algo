# =============================================================================
# HVLP MARKET SCORING — MANUAL DATA OVERRIDES
# =============================================================================
# Purpose: Supply data for variables that cannot be retrieved automatically,
#          or to correct/supersede API-sourced values.
#
# Structure:
#   overrides:
#     <Country Name (must match CSV exactly)>:
#       <variable_key>: <numeric value>
#
# Variable keys must match those in config.py WEIGHTS exactly.
#
# Seeded values below (2023/2024 data) — update as needed.
# Sources:
#   corporate_tax_rate   : OECD Tax Database 2024 (statutory CIT rate, %)
#   labor_cost_index     : Index vs US=100; derived from OECD/ILO average hourly
#                          labour compensation in manufacturing (USD), 2023
#   real_estate_cost_index: USD/sqm city-centre prime retail, Numbeo 2024
#   middle_class_pct     : % population earning $10–$100/day PPP
#                          (Pew Research / World Bank PovcalNet estimates, 2022)
# =============================================================================

