# =============================================================================
# HVLP MARKET SCORING — MANUAL DATA OVERRIDES
# =============================================================================
# Purpose: Supply data for variables that cannot be retrieved automatically,
#          or to correct/supersede API-sourced values.
#
# Structure:
#   overrides:
#     <Country Name (must match CSV exactly)>:
#       <variable_key>: <numeric value>
#
# Variable keys must match those in config.py WEIGHTS exactly.
#
# Data vintage: 2022–2024 (most-recent available).
# Sources:
#   corporate_tax_rate       : OECD Tax Database 2024 (statutory CIT rate, %)
#   labor_cost_index         : Index vs US=100; derived from OECD/ILO avg hourly
#                              labour compensation in manufacturing (USD), 2023
#   real_estate_cost_index   : USD/sqm city-centre prime retail, Numbeo 2024
#   middle_class_pct         : % population earning $10–$100/day PPP
#                              (Pew Research / World Bank PovcalNet, 2022)
#   ease_of_doing_business   : World Bank WGI Government Effectiveness (GE.EST)
#                              Scale –2.5 (worst) to +2.5 (best). 2022 vintage.
#   political_stability      : World Bank WGI Political Stability (PV.EST)
#                              Scale –2.5 to +2.5. 2022 vintage.
#   rule_of_law              : World Bank WGI Rule of Law (RL.EST)
#                              Scale –2.5 to +2.5. 2022 vintage.
#   inflation_rate           : Annual CPI % change, 2023 (World Bank / IMF).
#                              INVERTED in scoring — lower inflation = better.
#   currency_volatility      : 3yr std dev of annual % changes in USD/local FX
#                              (2020–2022). INVERTED — lower volatility = better.
#                              EUR-zone countries share EUR/USD vol ≈ 5.5.
#   youth_population_pct     : % population aged 15–64, World Bank 2022.
#   financing_accessibility  : GFDD composite proxy (0–100): avg of min-max
#                              normalised domestic credit, account ownership,
#                              and bank branches per 100k adults (WB 2022).
# =============================================================================

# =============================================================================
# PENETRATION OVERRIDES
# =============================================================================
# Override the future gym penetration rate assumption for specific countries.
# Set enabled: true to activate this section; individual null values keep the
# CSV default.  Values are fractions (e.g. 0.20 = 20%).
#
# These override the "Future_Penetration" column in input_data.csv.
# Values are applied BEFORE derived metrics (headroom, TAM, opportunity) are
# computed — so changing them here changes the entire market-size calculation.
#
# Validation rules applied at load time:
#   • Must be a number in range (0, 1] — fractions only (not percentages)
#   • Must be > current_penetration_pct for the country or the override is
#     silently ignored (logged as a warning)
# =============================================================================
penetration_overrides:
  enabled: false   # set to true to activate custom penetration assumptions
  values:
    Austria:        null   # default: 0.14 (CSV)
    Belgium:        null   # default: 0.17 (CSV)
